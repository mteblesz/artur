services:
  api:
    image: ghcr.io/mteblesz/artur/api:latest
    container_name: api
    restart: unless-stopped
    environment:
      ASPNETCORE_URLS: http://+:8080

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api